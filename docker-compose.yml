services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: ./backend
    command: celery -A worker worker --loglevel=info
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis